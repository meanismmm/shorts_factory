<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Factory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e6f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px; text-align: center; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #888; font-size: 14px; margin-top: 6px; }
.container { max-width: 780px; margin: 0 auto; padding: 24px 16px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.card h2 { font-size: 16px; font-weight: 600; color: #a78bfa; margin-bottom: 16px; }
label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
input[type="password"], input[type="file"], select, textarea {
  width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px;
  color: #e8e6f0; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s;
}
input[type="file"] { padding: 8px 14px; cursor: pointer; }
input:focus, select:focus, textarea:focus { border-color: #a78bfa; }
textarea { resize: vertical; min-height: 80px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media (max-width: 560px) { .row2,.row3 { grid-template-columns: 1fr; } }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s; width: 100%; margin-top: 8px; }
.btn-primary { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; }
.btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-green { background: linear-gradient(135deg, #059669, #0284c7); color: #fff; }
.btn-green:hover { opacity: 0.9; }
.btn-gray { background: #1e1e3a; color: #aaa; border: 1px solid #2a2a4a; }
.steps { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.step { display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 20px; font-size: 13px; border: 1px solid #2a2a4a; color: #555; }
.step.active { border-color: #a78bfa; color: #a78bfa; background: #1e1040; }
.step.done { border-color: #059669; color: #34d399; background: #0a2e1e; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.log { background: #0a0a14; border: 1px solid #1e1e3a; border-radius: 10px;
  padding: 14px; font-family: monospace; font-size: 13px; min-height: 60px;
  max-height: 220px; overflow-y: auto; color: #7dd3fc; }
.log-line.ok { color: #34d399; }
.log-line.err { color: #f87171; }
.log-line.info { color: #a78bfa; }
.progress-bar { height: 8px; background: #1e1e3a; border-radius: 4px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #2563eb); border-radius: 4px; transition: width 0.3s; }
.progress-label { font-size: 13px; color: #aaa; margin-top: 6px; }
.meta-title { font-size: 20px; font-weight: 700; color: #a78bfa; margin-bottom: 6px; }
.meta-sub { font-size: 13px; color: #888; margin-bottom: 10px; }
.meta-label { font-size: 12px; color: #666; margin-top: 12px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.meta-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: #1e1040; border: 1px solid #3730a3; color: #a78bfa; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
.tag-insta { background: #1a0a2e; border: 1px solid #7c3aed; color: #c084fc; }
.thumbnail-text { font-size: 17px; font-weight: 700; color: #fbbf24; padding: 10px; background: #1a1000; border-radius: 8px; border: 1px solid #92400e; margin-top: 6px; }
.scene-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1e1e2e; }
.scene-item:last-child { border-bottom: none; }
.scene-num { width: 26px; height: 26px; border-radius: 50%; background: #1e1040; border: 1px solid #3730a3; color: #a78bfa; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.beat-badge { font-size: 10px; padding: 1px 7px; border-radius: 4px; font-weight: 700; display: inline-block; margin-bottom: 3px; }
.scene-main { font-size: 14px; font-weight: 600; color: #e8e6f0; margin-bottom: 2px; }
.scene-narr { font-size: 12px; color: #93c5fd; margin-bottom: 2px; font-style: italic; }
.scene-dur { font-size: 10px; color: #f59e0b; }
.divider { height: 1px; background: #2a2a4a; margin: 16px 0; }
.hidden { display: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-left: 6px; }
.badge-free { background: #0a2e1e; color: #34d399; border: 1px solid #059669; }
.badge-paid { background: #1a1000; color: #fbbf24; border: 1px solid #d97706; }
.done-video { width: 100%; max-height: 400px; border-radius: 12px; border: 1px solid #2a2a4a; display: block; margin-bottom: 16px; }
.tip-box { background: #0f1a0f; border: 1px solid #166534; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #86efac; margin-top: 8px; line-height: 1.7; }
.tip-box a { color: #4ade80; }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Shorts Factory</h1>
  <p>기승전결 스토리 · 블러 영상 배경 · ElevenLabs 나레이션 · BGM 합성</p>
</div>

<div class="container">

  <div class="card">
    <h2>⚙️ API 설정</h2>
    <div class="row2">
      <div>
        <label>Claude API 키 <span class="badge badge-free">스크립트 생성</span></label>
        <input type="password" id="claude-key" placeholder="sk-ant-...">
      </div>
      <div>
        <label>Pexels API 키 <span class="badge badge-free">배경 영상</span></label>
        <input type="password" id="pexels-key" placeholder="Pexels 키">
      </div>
    </div>
    <div style="margin-top:14px">
      <label>ElevenLabs API 키 <span class="badge badge-free">무료 월 1만자</span></label>
      <input type="password" id="elevenlabs-key" placeholder="xi-api-key (선택사항 — 없으면 나레이션 생략)">
      <div class="tip-box" style="margin-top:8px">
        🎙️ <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> 무료 가입 →
        우측 상단 프로필 → API Key 복사. 월 10,000자 무료 (영상 약 25편).
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🎬 콘텐츠 설정</h2>
    <div class="row2">
      <div>
        <label>콘텐츠 주제</label>
        <select id="niche">
          <option value="역사/교양 (한국 역사, 충격적인 사실, 반전 있는 내용)">📜 역사/교양</option>
          <option value="AI/테크 지식 큐레이션">🤖 AI/테크</option>
          <option value="건강/생활 꿀팁 (과학적 근거 포함)">💪 건강/생활</option>
          <option value="심리학/자기계발">🧠 심리학/자기계발</option>
        </select>
      </div>
      <div>
        <label>배경 테마</label>
        <select id="bg-theme">
          <option value="dark_gold">🏯 다크 골드 (역사)</option>
          <option value="deep_blue">🌌 딥 블루 (AI/테크)</option>
          <option value="forest">🌿 포레스트 (건강)</option>
          <option value="deep_purple">🧠 딥 퍼플 (심리)</option>
          <option value="cinematic">🎬 시네마틱 블랙</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px">
      <label>추가 요청사항 (선택)</label>
      <textarea id="extra-prompt" placeholder="예: 조선시대 왕 관련, 20~30대 타겟, 반드시 반전 포함"></textarea>
    </div>
    <div style="margin-top:14px">
      <label>🎵 배경음악 mp3 업로드 <span class="badge badge-free">선택사항</span></label>
      <input type="file" id="bgm-file" accept="audio/*">
      <div class="tip-box">
        무료 BGM: <a href="https://studio.youtube.com/channel/music" target="_blank">유튜브 오디오 라이브러리</a>
        → 장르/분위기 검색 → 다운로드 → 여기 업로드
      </div>
    </div>
  </div>

  <div class="steps">
    <div class="step" id="step-1"><span class="step-dot"></span>스크립트</div>
    <div class="step" id="step-2"><span class="step-dot"></span>나레이션</div>
    <div class="step" id="step-3"><span class="step-dot"></span>영상 수집</div>
    <div class="step" id="step-4"><span class="step-dot"></span>합성</div>
    <div class="step" id="step-5"><span class="step-dot"></span>완성</div>
  </div>

  <button class="btn btn-primary" id="start-btn" onclick="startFactory()">▶ 영상 자동 생성 시작</button>

  <div class="card hidden" id="log-card" style="margin-top:20px">
    <h2>📋 진행 상황</h2>
    <div class="log" id="log"></div>
    <div class="progress-bar" id="pbar" style="display:none"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-label hidden" id="plabel"></div>
  </div>

  <div class="card hidden" id="script-card">
    <h2>📝 생성된 스크립트 확인</h2>
    <div id="meta-preview"></div>
    <div class="divider"></div>
    <div style="font-size:13px;color:#aaa;margin-bottom:10px" id="scene-count-label"></div>
    <div id="scene-preview"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-primary" onclick="startProduction()" style="flex:1">✅ 이 스크립트로 영상 만들기</button>
      <button class="btn btn-gray" onclick="startFactory()" style="flex:1">🔄 다시 생성</button>
    </div>
  </div>

  <div class="card hidden" id="done-card">
    <h2>🎉 영상 완성!</h2>
    <video id="preview-video" class="done-video" controls playsinline></video>
    <a class="btn btn-green" id="dl-btn" download="shorts.mp4">⬇️ 영상 다운로드 (mp4)</a>
    <div class="divider"></div>
    <div id="upload-meta"></div>
    <button class="btn btn-green" onclick="copyAllMeta()" style="margin-top:12px">📋 제목 + 해시태그 복사</button>
    <button class="btn btn-primary" onclick="location.reload()" style="margin-top:8px">🔄 새 영상 만들기</button>
  </div>

</div>

<canvas id="composer" width="1080" height="1920" style="display:none"></canvas>

<script>
let scriptData = null;
let narrBuffers = [];  // 장면별 나레이션 AudioBuffer
let videoBlobs = [];   // 장면별 영상 Blob

// ── 테마 ──────────────────────────────────────────────
const THEMES = {
  dark_gold:   { hook:'#f59e0b', rising:'#d97706', climax:'#ef4444', twist:'#e879f9', landing:'#84cc16', cta:'#6366f1', textMain:'#fbbf24', bg:'#1a0d00' },
  deep_blue:   { hook:'#3b82f6', rising:'#0ea5e9', climax:'#8b5cf6', twist:'#06b6d4', landing:'#14b8a6', cta:'#a78bfa', textMain:'#93c5fd', bg:'#000d1a' },
  forest:      { hook:'#22c55e', rising:'#16a34a', climax:'#eab308', twist:'#06b6d4', landing:'#84cc16', cta:'#2dd4bf', textMain:'#86efac', bg:'#001a08' },
  deep_purple: { hook:'#a855f7', rising:'#8b5cf6', climax:'#ec4899', twist:'#e879f9', landing:'#818cf8', cta:'#6366f1', textMain:'#d8b4fe', bg:'#0a001a' },
  cinematic:   { hook:'#ffffff', rising:'#e2e8f0', climax:'#ef4444', twist:'#60a5fa', landing:'#4ade80', cta:'#a78bfa', textMain:'#ffffff', bg:'#000000' },
};

const BEAT_LABELS = { hook:'훅', rising:'긴장', climax:'클라이맥스', twist:'반전', landing:'마무리', cta:'구독유도' };
const BEAT_COLORS = { hook:'#92400e', rising:'#1e3a8a', climax:'#7f1d1d', twist:'#581c87', landing:'#14532d', cta:'#1e1b4b' };
const BEAT_TEXT   = { hook:'#fbbf24', rising:'#93c5fd', climax:'#fca5a5', twist:'#e879f9', landing:'#86efac', cta:'#a5b4fc' };

function log(msg, type='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-line ' + type;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function setStep(n,s) { document.getElementById('step-'+n).className='step '+s; }
function setProgress(pct,label) {
  document.getElementById('pbar').style.display='block';
  document.getElementById('pfill').style.width=pct+'%';
  const l=document.getElementById('plabel');
  l.classList.remove('hidden'); l.textContent=label;
}

// ══════════════════════════════════════════════════════
// 1단계: 스크립트 생성
// ══════════════════════════════════════════════════════
async function startFactory() {
  const claudeKey = document.getElementById('claude-key').value.trim();
  const pexelsKey = document.getElementById('pexels-key').value.trim();
  if (!claudeKey) { alert('Claude API 키를 입력하세요.'); return; }
  if (!pexelsKey) { alert('Pexels API 키를 입력하세요.'); return; }

  document.getElementById('start-btn').disabled = true;
  document.getElementById('log-card').classList.remove('hidden');
  document.getElementById('script-card').classList.add('hidden');
  document.getElementById('done-card').classList.add('hidden');
  document.getElementById('log').innerHTML = '';
  document.getElementById('pbar').style.display = 'none';
  document.getElementById('plabel').classList.add('hidden');
  [1,2,3,4,5].forEach(n=>setStep(n,''));
  setStep(1,'active');

  log('🤖 Claude에게 스크립트 요청 중...','info');
  const niche = document.getElementById('niche').value;
  const extra = document.getElementById('extra-prompt').value.trim();

  const prompt = `너는 유튜브 숏츠/인스타 릴스 전문 스토리텔러야.
'${niche}' 분야에서 시청자가 끝까지 보게 만드는 주제 하나를 골라서,
반드시 아래 JSON 형식으로만 응답해. 마크다운 기호 절대 금지.
${extra ? '추가 조건: ' + extra : ''}

핵심 규칙:
1. 반드시 기승전결 구조의 하나의 완결된 이야기여야 함 (단어 나열 절대 금지)
2. scenes는 10~12개
3. main_text: 화면에 표시될 핵심 자막 (15자 이내)
4. narration: 해당 장면에서 읽힐 나레이션 문장 (자연스러운 구어체, 30자 이내). 전체 나레이션이 이어지면 하나의 스토리가 되어야 함
5. stock_keyword: 장면 분위기에 맞는 Pexels 검색 영어 키워드 (배경 블러 처리되므로 분위기만 맞으면 됨)
6. beat: hook/rising/climax/twist/landing/cta 중 하나
7. duration은 나레이션 읽는 시간보다 1초 여유있게 설정

{
  "title": "유튜브 제목 (궁금증 유발, 30자 이내)",
  "instagram_title": "인스타 제목 30자 이내",
  "topic": "주제 한 줄 요약",
  "thumbnail_text": "썸네일 문구 20자 이내",
  "story_hook": "첫 3초 시청자를 잡는 핵심 질문",
  "scenes": [
    {"beat":"hook","duration":4,"main_text":"훅 자막","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"hook","duration":4,"main_text":"훅 강화","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"rising","duration":5,"main_text":"배경 설명","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"rising","duration":5,"main_text":"긴장 고조","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"rising","duration":5,"main_text":"더 깊은 사실","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"climax","duration":6,"main_text":"반전 순간","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"climax","duration":6,"main_text":"클라이맥스","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"twist","duration":5,"main_text":"추가 반전","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"landing","duration":5,"main_text":"결론 정리","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"landing","duration":4,"main_text":"여운 남기기","narration":"나레이션 문장","stock_keyword":"영어 키워드"},
    {"beat":"cta","duration":4,"main_text":"다음 편도 있어요","narration":"구독과 좋아요 부탁드립니다!","stock_keyword":"subscribe"}
  ],
  "youtube_hashtags":["#태그1","#태그2","#태그3","#태그4","#태그5"],
  "instagram_hashtags":["#태그1","#태그2","#태그3","#태그4","#태그5","#태그6","#태그7","#태그8","#태그9","#태그10"]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    if (!res.ok){const e=await res.json();throw new Error(e.error?.message||'API 오류');}
    const data = await res.json();
    let raw = (data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON 파싱 실패 — 다시 시도해주세요');
    scriptData = JSON.parse(match[0]);
    const totalSec = scriptData.scenes.reduce((s,c)=>s+c.duration,0);
    setStep(1,'done');
    log(`✅ 주제: ${scriptData.topic}`,'ok');
    log(`✅ 제목: ${scriptData.title}`,'ok');
    log(`✅ ${scriptData.scenes.length}컷 · 총 ${totalSec}초`,'ok');
    renderPreview(totalSec);
    document.getElementById('script-card').classList.remove('hidden');
    document.getElementById('start-btn').disabled=false;
  } catch(e) {
    log('❌ '+e.message,'err');
    setStep(1,'');
    document.getElementById('start-btn').disabled=false;
  }
}

function renderPreview(totalSec) {
  const m = scriptData;
  document.getElementById('meta-preview').innerHTML=`
    <div class="meta-title">${m.title}</div>
    <div class="meta-sub">${m.topic}</div>
    <div style="background:#1a1000;border:1px solid #92400e;border-radius:8px;padding:10px;margin-top:8px">
      <div style="font-size:11px;color:#d97706;margin-bottom:3px">STORY HOOK</div>
      <div style="font-size:14px;color:#fde68a">${m.story_hook}</div>
    </div>
    <div class="thumbnail-text">🖼️ ${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  document.getElementById('scene-count-label').textContent=`스토리 구성 (${m.scenes.length}컷 · 총 ${totalSec}초)`;
  document.getElementById('scene-preview').innerHTML=m.scenes.map((s,i)=>`
    <div class="scene-item">
      <div class="scene-num">${i+1}</div>
      <div style="flex:1">
        <span class="beat-badge" style="background:${BEAT_COLORS[s.beat]||'#1e1e3a'};color:${BEAT_TEXT[s.beat]||'#aaa'}">${BEAT_LABELS[s.beat]||s.beat}</span>
        <span class="scene-dur">${s.duration}초</span>
        <div class="scene-main">${s.main_text}</div>
        <div class="scene-narr">🎙️ ${s.narration}</div>
        <div style="font-size:11px;color:#555">🔍 ${s.stock_keyword}</div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════
// 프로덕션 시작 (나레이션 → 영상수집 → 합성)
// ══════════════════════════════════════════════════════
async function startProduction() {
  document.getElementById('script-card').classList.add('hidden');
  narrBuffers = [];
  videoBlobs = [];

  await generateNarration();
  await fetchVideos();
  await composeVideo();
}

// ══════════════════════════════════════════════════════
// 2단계: ElevenLabs 나레이션 생성
// ══════════════════════════════════════════════════════
async function generateNarration() {
  const elKey = document.getElementById('elevenlabs-key').value.trim();
  setStep(2,'active');

  if (!elKey) {
    log('ℹ️ ElevenLabs 키 없음 — 나레이션 생략','info');
    setStep(2,'done');
    narrBuffers = new Array(scriptData.scenes.length).fill(null);
    return;
  }

  log('🎙️ ElevenLabs 나레이션 생성 중...','info');
  setProgress(5,'나레이션 생성 중...');

  // 한국어 지원 voice ID (Rachel → 한국어 가능한 Multilingual v2)
  const VOICE_ID = 'pNInz6obpgDQGcFmaJgB'; // Adam (다국어 지원)

  const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

  for (let i=0; i<scriptData.scenes.length; i++) {
    const text = scriptData.scenes[i].narration;
    setProgress(5+(i/scriptData.scenes.length)*20, `나레이션 ${i+1}/${scriptData.scenes.length}...`);
    log(`  [${i+1}] "${text}"`);
    try {
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,{
        method:'POST',
        headers:{'Content-Type':'application/json','xi-api-key':elKey},
        body:JSON.stringify({
          text,
          model_id:'eleven_multilingual_v2',
          voice_settings:{stability:0.5,similarity_boost:0.75}
        })
      });
      if (!res.ok) throw new Error(`ElevenLabs 오류 ${res.status}`);
      const arrayBuf = await (await res.blob()).arrayBuffer();
      const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
      narrBuffers.push(audioBuf);
      log(`  ✅ 완료 (${(audioBuf.duration).toFixed(1)}초)`,'ok');
    } catch(e) {
      log(`  ⚠️ 실패: ${e.message} — 해당 장면 나레이션 생략`,'err');
      narrBuffers.push(null);
    }
  }
  setStep(2,'done');
  log('✅ 나레이션 생성 완료','ok');
}

// ══════════════════════════════════════════════════════
// 3단계: Pexels 배경 영상 수집
// ══════════════════════════════════════════════════════
async function fetchVideos() {
  const pexelsKey = document.getElementById('pexels-key').value.trim();
  setStep(3,'active');
  log('🎬 배경 영상 수집 중...','info');
  const scenes = scriptData.scenes;
  const cache = {};

  for (let i=0; i<scenes.length; i++) {
    const kw = scenes[i].stock_keyword;
    setProgress(26+(i/scenes.length)*24, `영상 수집 ${i+1}/${scenes.length}...`);
    if (cache[kw]) { videoBlobs.push(cache[kw]); log(`  [${i+1}] 캐시 사용: "${kw}"`,'ok'); continue; }
    log(`  [${i+1}] 검색: "${kw}"`);
    try {
      const r = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(kw)}&per_page=5&orientation=portrait`,{headers:{Authorization:pexelsKey}});
      const d = await r.json();
      let vids = d.videos||[];
      if (!vids.length) {
        // 키워드 단순화 재시도
        const r2 = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(kw.split(' ')[0])}&per_page=3`,{headers:{Authorization:pexelsKey}});
        vids = (await r2.json()).videos||[];
      }
      if (!vids.length) { videoBlobs.push(null); log(`  ⚠️ 없음 — 단색 배경 사용`); continue; }
      const chosen = vids[0].video_files?.find(f=>f.height>f.width)||vids[0].video_files?.[0];
      const blob = await (await fetch(chosen.link)).blob();
      cache[kw]=blob; videoBlobs.push(blob);
      log(`  ✅ ${(blob.size/1024/1024).toFixed(1)}MB`,'ok');
    } catch(e) { videoBlobs.push(null); log(`  ❌ ${e.message}`,'err'); }
  }
  setStep(3,'done');
}

// ══════════════════════════════════════════════════════
// 4단계: Canvas 합성
// ══════════════════════════════════════════════════════
async function composeVideo() {
  setStep(4,'active');
  log('🎨 Canvas 합성 시작...','info');
  setProgress(52,'합성 준비 중...');

  const canvas = document.getElementById('composer');
  const ctx = canvas.getContext('2d');
  const W=1080,H=1920,FPS=30;
  const themeKey = document.getElementById('bg-theme').value;
  const theme = THEMES[themeKey]||THEMES.dark_gold;
  const scenes = scriptData.scenes;
  const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

  // BGM 로드
  let bgmBuffer=null;
  const bgmFile = document.getElementById('bgm-file').files[0];
  if (bgmFile) {
    try {
      bgmBuffer = await audioCtx.decodeAudioData(await bgmFile.arrayBuffer());
      log('🎵 BGM 로드 완료','ok');
    } catch(e) { log('⚠️ BGM 로드 실패','err'); }
  }

  // MediaStream 구성
  const mediaStreamDest = audioCtx.createMediaStreamDestination();

  // BGM 재생 (볼륨 낮게)
  if (bgmBuffer) {
    const bgmGain = audioCtx.createGain();
    bgmGain.gain.value = narrBuffers.some(b=>b) ? 0.25 : 0.65; // 나레이션 있으면 BGM 작게
    const bgmSrc = audioCtx.createBufferSource();
    bgmSrc.buffer=bgmBuffer; bgmSrc.loop=true;
    bgmSrc.connect(bgmGain); bgmGain.connect(mediaStreamDest);
    bgmSrc.start();
  }

  const mimeType = MediaRecorder.isTypeSupported('video/mp4')?'video/mp4'
    :MediaRecorder.isTypeSupported('video/webm;codecs=h264')?'video/webm;codecs=h264'
    :'video/webm;codecs=vp8';

  const streamTracks=[canvas.captureStream(FPS).getVideoTracks()[0],...mediaStreamDest.stream.getAudioTracks()];
  const recorder = new MediaRecorder(new MediaStream(streamTracks),{mimeType,videoBitsPerSecond:6000000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  recorder.start(100);
  log('🎬 녹화 시작!','info');

  // 나레이션 재생 타이밍 관리
  let sceneStartTime = audioCtx.currentTime;

  for (let i=0; i<scenes.length; i++) {
    const scene = scenes[i];
    const accentColor = theme[scene.beat]||theme.hook;

    // 나레이션 예약
    const narrBuf = narrBuffers[i];
    if (narrBuf) {
      const narrGain = audioCtx.createGain();
      narrGain.gain.value = 1.0;
      const narrSrc = audioCtx.createBufferSource();
      narrSrc.buffer=narrBuf;
      narrSrc.connect(narrGain); narrGain.connect(mediaStreamDest);
      narrSrc.start(sceneStartTime + 0.3); // 장면 시작 0.3초 후 나레이션
    }

    // duration: 나레이션 길이 or scene.duration 중 더 긴 것
    const narrDur = narrBuf ? narrBuf.duration + 0.8 : 0;
    const dur = Math.max(scene.duration, narrDur) * 1000;
    sceneStartTime += dur/1000;

    setProgress(52+(i/scenes.length)*40, `장면 ${i+1}/${scenes.length} 합성...`);
    log(`  [${i+1}] ${scene.beat} · ${scene.main_text}`);

    // 배경 영상 준비
    let videoEl=null;
    const blob=videoBlobs[i];
    if (blob) {
      videoEl=document.createElement('video');
      videoEl.src=URL.createObjectURL(blob);
      videoEl.muted=true; videoEl.loop=true; videoEl.playsInline=true;
      await new Promise(r=>{videoEl.onloadeddata=r;videoEl.onerror=r;videoEl.load();});
      if (videoEl.duration>scene.duration+2) {
        videoEl.currentTime=Math.random()*(videoEl.duration-scene.duration-1);
        await new Promise(r=>{videoEl.onseeked=r;});
      }
      try{await videoEl.play();}catch(e){}
    }

    const startMs=performance.now();
    await new Promise(resolve=>{
      function draw(){
        const elapsed=performance.now()-startMs;
        if (elapsed>=dur){resolve();return;}
        const t=elapsed/dur;

        // ── 배경 영상 (블러 처리) ──
        if (videoEl&&videoEl.readyState>=2){
          const vw=videoEl.videoWidth,vh=videoEl.videoHeight;
          const scale=Math.max(W/vw,H/vh);
          const dw=vw*scale,dh=vh*scale;
          ctx.filter='blur(18px) brightness(0.45)';
          ctx.drawImage(videoEl,(W-dw)/2,(H-dh)/2,dw,dh);
          ctx.filter='none';
        } else {
          // 단색 + 그라데이션 대체
          const g=ctx.createLinearGradient(0,0,0,H);
          g.addColorStop(0,theme.bg); g.addColorStop(1,'#000000');
          ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        }

        // ── 비네팅 (가장자리 어둡게) ──
        const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
        vig.addColorStop(0,'rgba(0,0,0,0)');
        vig.addColorStop(1,'rgba(0,0,0,0.72)');
        ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

        // ── 상단 컬러 바 ──
        ctx.fillStyle=accentColor;
        ctx.fillRect(0,0,W,10);

        // ── 장면 진행 바 ──
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect(60,H-90,W-120,6);
        roundRect(ctx,60,H-90,(W-120)*t,6,3);
        ctx.fillStyle=accentColor; ctx.fill();

        // ── 장면 번호 ──
        ctx.font='bold 30px Arial';
        ctx.fillStyle='rgba(255,255,255,0.38)';
        ctx.textAlign='left';
        ctx.fillText(`${i+1} / ${scenes.length}`,60,110);

        // ── beat 배지 ──
        ctx.font='bold 28px Arial';
        ctx.fillStyle=accentColor;
        ctx.textAlign='right';
        ctx.fillText(BEAT_LABELS[scene.beat]||scene.beat, W-60, 110);

        // ── 자막 ──
        drawSubtitle(ctx,scene.main_text,scene.narration,accentColor,theme.textMain,W,H);

        requestAnimationFrame(draw);
      }
      draw();
    });
    if(videoEl){videoEl.pause();URL.revokeObjectURL(videoEl.src);}
  }

  recorder.stop();
  setProgress(94,'파일 변환 중...');
  await new Promise(r=>recorder.onstop=r);

  const url=URL.createObjectURL(new Blob(chunks,{type:mimeType}));
  document.getElementById('preview-video').src=url;
  document.getElementById('dl-btn').href=url;
  document.getElementById('dl-btn').download=`shorts_${Date.now()}.mp4`;
  renderUploadMeta();
  setStep(4,'done'); setStep(5,'done');
  setProgress(100,'완성!');
  log('🎉 완성!','ok');
  document.getElementById('done-card').classList.remove('hidden');
  document.getElementById('done-card').scrollIntoView({behavior:'smooth'});
}

// ── 자막 렌더링 (메인 + 나레이션 미리보기) ────────────
function drawSubtitle(ctx,mainText,narrText,accentColor,textColor,W,H){
  const CY=H*0.615, MS=84, DS=46, GAP=20, PX=52, PY=28, MW=W*0.83, R=22;

  ctx.font=`bold ${MS}px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif`;
  const mLines=wrapText(ctx,mainText,MW);
  ctx.font=`${DS}px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif`;
  const dLines=narrText?wrapText(ctx,narrText,MW-30):[];

  const mH=mLines.length*(MS*1.25);
  const dH=dLines.length>0?dLines.length*(DS*1.3)+GAP:0;
  const totH=mH+dH;
  const bW=MW+PX*2, bH=totH+PY*2;
  const bX=(W-bW)/2, bY=CY-totH/2-PY;

  ctx.fillStyle='rgba(0,0,0,0.70)';
  roundRect(ctx,bX,bY,bW,bH,R); ctx.fill();

  ctx.fillStyle=accentColor;
  roundRect(ctx,bX,bY,9,bH,[R,0,0,R]); ctx.fill();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  let cy=CY-totH/2+MS*0.625;
  ctx.font=`bold ${MS}px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif`;
  mLines.forEach(l=>{
    ctx.strokeStyle='rgba(0,0,0,0.95)'; ctx.lineWidth=10; ctx.lineJoin='round';
    ctx.strokeText(l,W/2,cy);
    ctx.fillStyle=textColor; ctx.fillText(l,W/2,cy);
    cy+=MS*1.25;
  });
  if (dLines.length>0){
    cy+=GAP*0.3;
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2-180,cy); ctx.lineTo(W/2+180,cy); ctx.stroke();
    cy+=GAP*0.8;
    ctx.font=`${DS}px 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif`;
    dLines.forEach(l=>{
      ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=5;
      ctx.strokeText(l,W/2,cy);
      ctx.fillStyle='rgba(210,210,210,0.88)'; ctx.fillText(l,W/2,cy);
      cy+=DS*1.3;
    });
  }
}

function wrapText(ctx,text,maxW){
  if(!text)return[];
  if(ctx.measureText(text).width<=maxW)return[text];
  const chars=[...text];const lines=[];let cur='';
  for(const ch of chars){
    const t=cur+ch;
    if(ctx.measureText(t).width>maxW&&cur.length>0){lines.push(cur);cur=ch;}
    else cur=t;
  }
  if(cur)lines.push(cur);
  return lines;
}

function roundRect(ctx,x,y,w,h,r){
  const[tl,tr,br,bl]=Array.isArray(r)?r:[r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+tl,y);
  ctx.lineTo(x+w-tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br);ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl);ctx.quadraticCurveTo(x,y,x+tl,y);
  ctx.closePath();
}

function renderUploadMeta(){
  const m=scriptData;
  document.getElementById('upload-meta').innerHTML=`
    <div class="meta-label">유튜브 제목</div>
    <div style="font-size:16px;font-weight:600;color:#e8e6f0">${m.title}</div>
    <div class="meta-label">인스타그램 제목</div>
    <div style="font-size:15px;color:#e8e6f0">${m.instagram_title}</div>
    <div class="meta-label">썸네일 문구</div>
    <div class="thumbnail-text">🖼️ ${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="meta-label">인스타그램 해시태그</div>
    <div class="meta-tags">${m.instagram_hashtags.map(t=>`<span class="tag tag-insta">${t}</span>`).join('')}</div>`;
}

function copyAllMeta(){
  const m=scriptData;
  navigator.clipboard.writeText(
    `[유튜브]\n제목: ${m.title}\n해시태그: ${m.youtube_hashtags.join(' ')}\n\n[인스타그램]\n제목: ${m.instagram_title}\n해시태그: ${m.instagram_hashtags.join(' ')}\n\n썸네일: ${m.thumbnail_text}`
  ).then(()=>alert('✅ 복사 완료!'));
}
