<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Factory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e6f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px; text-align: center; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #888; font-size: 14px; margin-top: 6px; }
.container { max-width: 780px; margin: 0 auto; padding: 24px 16px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.card h2 { font-size: 16px; font-weight: 600; color: #a78bfa; margin-bottom: 16px; }
label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
input[type="password"], select, textarea {
  width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px;
  color: #e8e6f0; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: #a78bfa; }
textarea { resize: vertical; min-height: 80px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s; width: 100%; margin-top: 8px; }
.btn-primary { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; }
.btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-green { background: linear-gradient(135deg, #059669, #0284c7); color: #fff; }
.btn-green:hover { opacity: 0.9; }
.btn-gray { background: #1e1e3a; color: #aaa; border: 1px solid #2a2a4a; }
.btn-gray:hover { background: #2a2a4a; }
.steps { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.step { display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 20px; font-size: 13px; border: 1px solid #2a2a4a; color: #555; }
.step.active { border-color: #a78bfa; color: #a78bfa; background: #1e1040; }
.step.done { border-color: #059669; color: #34d399; background: #0a2e1e; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.log { background: #0a0a14; border: 1px solid #1e1e3a; border-radius: 10px;
  padding: 14px; font-family: monospace; font-size: 13px; min-height: 60px;
  max-height: 200px; overflow-y: auto; color: #7dd3fc; }
.log-line.ok { color: #34d399; }
.log-line.err { color: #f87171; }
.log-line.info { color: #a78bfa; }
.progress-bar { height: 8px; background: #1e1e3a; border-radius: 4px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #2563eb); border-radius: 4px; transition: width 0.4s; }
.progress-label { font-size: 13px; color: #aaa; margin-top: 6px; }
.meta-title { font-size: 20px; font-weight: 700; color: #a78bfa; margin-bottom: 6px; }
.meta-sub { font-size: 13px; color: #888; margin-bottom: 12px; }
.meta-label { font-size: 12px; color: #666; margin-top: 12px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.meta-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: #1e1040; border: 1px solid #3730a3; color: #a78bfa; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
.tag-insta { background: #1a0a2e; border: 1px solid #7c3aed; color: #c084fc; }
.thumbnail-text { font-size: 18px; font-weight: 700; color: #fbbf24; padding: 10px; background: #1a1000; border-radius: 8px; border: 1px solid #92400e; margin-top: 6px; }
.scene-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1e1e2e; }
.scene-item:last-child { border-bottom: none; }
.scene-num { width: 28px; height: 28px; border-radius: 50%; background: #1e1040; border: 1px solid #3730a3; color: #a78bfa; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.scene-time { font-size: 11px; color: #60a5fa; font-family: monospace; margin-bottom: 3px; }
.scene-subtitle { font-size: 15px; font-weight: 600; color: #e8e6f0; margin-bottom: 4px; }
.scene-kw { font-size: 12px; color: #888; }
.divider { height: 1px; background: #2a2a4a; margin: 16px 0; }
.hidden { display: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-left: 6px; }
.badge-cost { background: #0a2e1e; color: #34d399; border: 1px solid #059669; }
.done-video { width: 100%; max-height: 360px; border-radius: 12px; border: 1px solid #2a2a4a; display: block; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Shorts Factory</h1>
  <p>AI 스크립트 → 스톡영상 자동 수집 → Canvas 영상 합성</p>
</div>

<div class="container">

  <!-- 설정 -->
  <div class="card">
    <h2>⚙️ API 설정</h2>
    <div class="row">
      <div>
        <label>Claude API 키 <span class="badge badge-cost">영상 1편 ≈ $0.001</span></label>
        <input type="password" id="claude-key" placeholder="sk-ant-...">
      </div>
      <div>
        <label>Pexels API 키 <span class="badge badge-cost">무료</span></label>
        <input type="password" id="pexels-key" placeholder="Pexels 키 입력">
      </div>
    </div>
    <div style="margin-top:14px">
      <label>콘텐츠 주제</label>
      <select id="niche">
        <option value="역사/교양 (충격적인 사실, 반전 있는 내용)">📜 역사/교양</option>
        <option value="AI/테크 지식 큐레이션">🤖 AI/테크</option>
        <option value="건강/생활 꿀팁 (과학적 근거 포함)">💪 건강/생활</option>
        <option value="심리학/자기계발">🧠 심리학/자기계발</option>
      </select>
    </div>
    <div style="margin-top:12px">
      <label>추가 요청사항 (선택)</label>
      <textarea id="extra-prompt" placeholder="예: 20~30대 타겟, 반드시 반전 있는 내용으로"></textarea>
    </div>
  </div>

  <!-- 진행 단계 -->
  <div class="steps">
    <div class="step" id="step-1"><span class="step-dot"></span>스크립트 생성</div>
    <div class="step" id="step-2"><span class="step-dot"></span>영상 다운로드</div>
    <div class="step" id="step-3"><span class="step-dot"></span>Canvas 합성</div>
    <div class="step" id="step-4"><span class="step-dot"></span>완성</div>
  </div>

  <button class="btn btn-primary" id="start-btn" onclick="startFactory()">▶ 영상 자동 생성 시작</button>

  <!-- 로그 -->
  <div class="card hidden" id="log-card" style="margin-top:20px">
    <h2>📋 진행 상황</h2>
    <div class="log" id="log"></div>
    <div class="progress-bar" id="pbar" style="display:none"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-label hidden" id="plabel"></div>
  </div>

  <!-- 스크립트 확인 -->
  <div class="card hidden" id="script-card">
    <h2>📝 생성된 스크립트</h2>
    <div id="meta-preview"></div>
    <div class="divider"></div>
    <div style="font-size:13px;color:#aaa;margin-bottom:10px">장면 구성 (6장면 · 60초)</div>
    <div id="scene-preview"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-primary" onclick="startVideoProcess()" style="flex:1">✅ 이 주제로 영상 만들기</button>
      <button class="btn btn-gray" onclick="startFactory()" style="flex:1">🔄 다시 생성</button>
    </div>
  </div>

  <!-- 완성 -->
  <div class="card hidden" id="done-card">
    <h2>🎉 영상 완성!</h2>
    <video id="preview-video" class="done-video" controls playsinline></video>
    <a class="btn btn-green" id="dl-btn" download="shorts.mp4">⬇️ 영상 다운로드 (mp4)</a>
    <div class="divider"></div>
    <h2 style="margin-bottom:12px">🏷️ 업로드 정보</h2>
    <div id="upload-meta"></div>
    <button class="btn btn-green" onclick="copyAllMeta()" style="margin-top:12px">📋 제목 + 해시태그 복사</button>
    <button class="btn btn-primary" onclick="location.reload()" style="margin-top:8px">🔄 새 영상 만들기</button>
  </div>

</div>

<!-- 숨겨진 canvas (합성용) -->
<canvas id="composer" width="1080" height="1920" style="display:none"></canvas>

<script>
let scriptData = null;
let videoBlobs = [];

function log(msg, type='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-line ' + type;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setStep(n, s) { document.getElementById('step-' + n).className = 'step ' + s; }

function setProgress(pct, label) {
  document.getElementById('pbar').style.display = 'block';
  document.getElementById('pfill').style.width = pct + '%';
  const lbl = document.getElementById('plabel');
  lbl.classList.remove('hidden');
  lbl.textContent = label;
}

// ── 1단계: 스크립트 생성 ──────────────────────────
async function startFactory() {
  const claudeKey = document.getElementById('claude-key').value.trim();
  const pexelsKey = document.getElementById('pexels-key').value.trim();
  if (!claudeKey) { alert('Claude API 키를 입력하세요.'); return; }
  if (!pexelsKey) { alert('Pexels API 키를 입력하세요.'); return; }

  document.getElementById('start-btn').disabled = true;
  document.getElementById('log-card').classList.remove('hidden');
  document.getElementById('script-card').classList.add('hidden');
  document.getElementById('done-card').classList.add('hidden');
  document.getElementById('log').innerHTML = '';
  document.getElementById('pbar').style.display = 'none';
  document.getElementById('plabel').classList.add('hidden');
  setStep(1,'active'); setStep(2,''); setStep(3,''); setStep(4,'');

  log('🤖 Claude에게 스크립트 요청 중...', 'info');

  const niche = document.getElementById('niche').value;
  const extra = document.getElementById('extra-prompt').value.trim();

  const prompt = `너는 유튜브 숏츠/인스타 릴스 전문 콘텐츠 제작자야.
'${niche}' 분야에서 바이럴 가능성 높은 주제 하나를 골라서,
반드시 아래 JSON 형식으로만 응답해. 마크다운 기호 절대 금지.
${extra ? '추가 조건: ' + extra : ''}

{"title":"유튜브 제목 30자 이내","instagram_title":"인스타 제목 30자 이내","topic":"주제 한 줄 요약","thumbnail_text":"썸네일 문구 20자 이내","scenes":[{"time":"00:00-00:05","subtitle":"훅 15자 이내","stock_keyword":"영어 키워드 3단어 이내"},{"time":"00:05-00:15","subtitle":"핵심1 15자 이내","stock_keyword":"영어 키워드"},{"time":"00:15-00:25","subtitle":"핵심2 15자 이내","stock_keyword":"영어 키워드"},{"time":"00:25-00:35","subtitle":"핵심3 15자 이내","stock_keyword":"영어 키워드"},{"time":"00:35-00:50","subtitle":"반전결론 15자 이내","stock_keyword":"영어 키워드"},{"time":"00:50-01:00","subtitle":"구독과 좋아요 부탁드려요!","stock_keyword":"subscribe notification bell"}],"youtube_hashtags":["#태그1","#태그2","#태그3","#태그4","#태그5"],"instagram_hashtags":["#태그1","#태그2","#태그3","#태그4","#태그5","#태그6","#태그7","#태그8","#태그9","#태그10"]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API 오류'); }
    const data = await res.json();
    let raw = (data.content?.[0]?.text || '').replace(/```json|```/g,'').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON 파싱 실패');
    scriptData = JSON.parse(match[0]);
    setStep(1,'done');
    log('✅ 주제: ' + scriptData.topic, 'ok');
    log('✅ 제목: ' + scriptData.title, 'ok');
    renderScriptPreview();
    document.getElementById('script-card').classList.remove('hidden');
    document.getElementById('start-btn').disabled = false;
  } catch(e) {
    log('❌ ' + e.message, 'err');
    setStep(1,'');
    document.getElementById('start-btn').disabled = false;
  }
}

function renderScriptPreview() {
  const m = scriptData;
  document.getElementById('meta-preview').innerHTML = `
    <div class="meta-title">${m.title}</div>
    <div class="meta-sub">${m.topic}</div>
    <div class="thumbnail-text">🖼️ ${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  document.getElementById('scene-preview').innerHTML = m.scenes.map((s,i)=>`
    <div class="scene-item">
      <div class="scene-num">${i+1}</div>
      <div>
        <div class="scene-time">${s.time}</div>
        <div class="scene-subtitle">${s.subtitle}</div>
        <div class="scene-kw">🔍 ${s.stock_keyword}</div>
      </div>
    </div>`).join('');
}

// ── 2단계: 영상 다운로드 ────────────────────────────
async function startVideoProcess() {
  const pexelsKey = document.getElementById('pexels-key').value.trim();
  document.getElementById('script-card').classList.add('hidden');
  setStep(2,'active');
  videoBlobs = [];

  for (let i = 0; i < scriptData.scenes.length; i++) {
    const kw = scriptData.scenes[i].stock_keyword;
    setProgress(5 + i/scriptData.scenes.length*40, `영상 다운로드 중... (${i+1}/${scriptData.scenes.length})`);
    log(`[${i+1}/6] 검색: "${kw}"`);
    try {
      const res = await fetch(
        `https://api.pexels.com/videos/search?query=${encodeURIComponent(kw)}&per_page=5&orientation=portrait`,
        { headers: { Authorization: pexelsKey } }
      );
      const data = await res.json();
      const videos = data.videos || [];
      if (!videos.length) { videoBlobs.push(null); log('  ⚠️ 영상 없음, 검정 화면으로 대체'); continue; }
      const vfiles = videos[0].video_files || [];
      const chosen = vfiles.find(f=>f.height>f.width) || vfiles[0];
      const blob = await (await fetch(chosen.link)).blob();
      videoBlobs.push(blob);
      log(`  ✅ 완료 (${(blob.size/1024/1024).toFixed(1)}MB)`, 'ok');
    } catch(e) {
      videoBlobs.push(null);
      log('  ❌ 실패: ' + e.message, 'err');
    }
  }
  setStep(2,'done');
  await composeVideo();
}

// ── 3단계: Canvas 합성 ──────────────────────────────
async function composeVideo() {
  setStep(3,'active');
  log('🎨 Canvas로 영상 합성 시작...', 'info');
  setProgress(50, 'Canvas 합성 준비 중...');

  const canvas = document.getElementById('composer');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1920;
  const FPS = 30;
  const scenes = scriptData.scenes;

  // MediaRecorder로 canvas 스트림 녹화
  const stream = canvas.captureStream(FPS);
  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 4000000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.start(100);
  log('🎬 녹화 시작...', 'info');

  for (let i = 0; i < scenes.length; i++) {
    const scene = scenes[i];
    const [startStr, endStr] = scene.time.split('-');
    const duration = (timeToSec(endStr) - timeToSec(startStr)) * 1000; // ms
    const subtitle = scene.subtitle;

    setProgress(50 + (i/scenes.length)*40, `장면 ${i+1}/6 합성 중...`);
    log(`  장면 ${i+1}: ${subtitle}`);

    const blob = videoBlobs[i];
    let videoEl = null;

    if (blob) {
      videoEl = document.createElement('video');
      videoEl.src = URL.createObjectURL(blob);
      videoEl.muted = true;
      videoEl.loop = true;
      await new Promise(r => { videoEl.onloadeddata = r; videoEl.onerror = r; videoEl.load(); });
      try { await videoEl.play(); } catch(e) {}
    }

    const startTime = performance.now();
    await new Promise(resolve => {
      function drawFrame() {
        const elapsed = performance.now() - startTime;
        if (elapsed >= duration) { resolve(); return; }

        // 배경: 영상 or 검정
        if (videoEl && videoEl.readyState >= 2) {
          // 세로 크롭으로 canvas에 맞춤
          const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
          const scale = Math.max(W/vw, H/vh);
          const dw = vw*scale, dh = vh*scale;
          const dx = (W-dw)/2, dy = (H-dh)/2;
          ctx.drawImage(videoEl, dx, dy, dw, dh);
        } else {
          ctx.fillStyle = '#111111';
          ctx.fillRect(0, 0, W, H);
        }

        // 반투명 그라데이션 오버레이 (가독성)
        const grad = ctx.createLinearGradient(0, H*0.5, 0, H);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.7)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // 자막 (세이프존 62% 위치)
        const textY = H * 0.62;
        const fontSize = 80;
        ctx.font = `bold ${fontSize}px -apple-system, Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 자막 배경 박스
        const metrics = ctx.measureText(subtitle);
        const textW = metrics.width;
        const padX = 40, padY = 20;
        const boxX = (W - textW)/2 - padX;
        const boxY = textY - fontSize/2 - padY;
        const boxW = textW + padX*2;
        const boxH = fontSize + padY*2;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        roundRect(ctx, boxX, boxY, boxW, boxH, 16);
        ctx.fill();

        // 자막 텍스트 (외곽선 + 흰색)
        ctx.strokeStyle = 'rgba(0,0,0,0.9)';
        ctx.lineWidth = 6;
        ctx.strokeText(subtitle, W/2, textY);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(subtitle, W/2, textY);

        requestAnimationFrame(drawFrame);
      }
      drawFrame();
    });

    if (videoEl) { videoEl.pause(); URL.revokeObjectURL(videoEl.src); }
  }

  recorder.stop();
  setProgress(92, '영상 파일 생성 중...');
  log('⏳ 파일 변환 중...', 'info');

  await new Promise(r => recorder.onstop = r);
  const finalBlob = new Blob(chunks, { type: 'video/webm' });
  const url = URL.createObjectURL(finalBlob);

  document.getElementById('preview-video').src = url;
  document.getElementById('dl-btn').href = url;
  document.getElementById('dl-btn').download = `shorts_${Date.now()}.webm`;

  renderUploadMeta();
  setStep(3,'done'); setStep(4,'done');
  setProgress(100, '완성!');
  log('🎉 영상 완성!', 'ok');
  document.getElementById('done-card').classList.remove('hidden');
  document.getElementById('done-card').scrollIntoView({ behavior: 'smooth' });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function renderUploadMeta() {
  const m = scriptData;
  document.getElementById('upload-meta').innerHTML = `
    <div class="meta-label">유튜브 제목</div>
    <div style="font-size:16px;font-weight:600;color:#e8e6f0">${m.title}</div>

    <div style="font-size:15px;color:#e8e6f0">${m.instagram_title}</div>
    <div class="meta-label">썸네일 문구</div>
    <div class="thumbnail-text">🖼️ ${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="meta-label">인스타그램 해시태그</div>
    <div class="meta-tags">${m.instagram_hashtags.map(t=>`<span class="tag tag-insta">${t}</span>`).join('')}</div>`;
}

function copyAllMeta() {
  const m = scriptData;
  const text = `[유튜브]\n제목: ${m.title}\n해시태그: ${m.youtube_hashtags.join(' ')}\n\n[인스타그램]\n제목: ${m.instagram_title}\n해시태그: ${m.instagram_hashtags.join(' ')}\n\n썸네일: ${m.thumbnail_text}`;
  navigator.clipboard.writeText(text).then(() => alert('✅ 복사 완료!'));
}

function timeToSec(t) {
  const [m,s] = t.trim().split(':').map(Number);
  return m*60+s;
}
