<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Factory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e6f0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px; text-align: center; border-bottom: 1px solid #2a2a4a; }
  .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: #888; font-size: 14px; margin-top: 6px; }

  .container { max-width: 760px; margin: 0 auto; padding: 24px 16px; }

  .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; color: #a78bfa; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
  input[type="text"], input[type="password"], select, textarea {
    width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px;
    color: #e8e6f0; padding: 10px 14px; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: #a78bfa; }
  textarea { resize: vertical; min-height: 80px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s; width: 100%; margin-top: 8px; }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-success { background: linear-gradient(135deg, #059669, #0284c7); color: #fff; }
  .btn-success:hover { opacity: 0.9; }

  .steps { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .step { display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 20px; font-size: 13px; border: 1px solid #2a2a4a; color: #666; }
  .step.active { border-color: #a78bfa; color: #a78bfa; background: #1e1040; }
  .step.done { border-color: #059669; color: #34d399; background: #0a2e1e; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  .log { background: #0a0a14; border: 1px solid #1e1e3a; border-radius: 10px;
    padding: 14px; font-family: monospace; font-size: 13px; min-height: 100px;
    max-height: 220px; overflow-y: auto; color: #7dd3fc; }
  .log-line { padding: 2px 0; }
  .log-line.ok { color: #34d399; }
  .log-line.err { color: #f87171; }
  .log-line.info { color: #a78bfa; }

  .script-box { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; margin-top: 12px; }
  .scene-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #1e1e2e; }
  .scene-row:last-child { border-bottom: none; }
  .scene-time { color: #60a5fa; font-size: 12px; font-family: monospace; min-width: 90px; padding-top: 2px; }
  .scene-text { flex: 1; }
  .scene-sub { font-size: 14px; color: #e8e6f0; margin-bottom: 4px; }
  .scene-kw { font-size: 12px; color: #888; }

  .meta-box { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; margin-top: 12px; }
  .meta-title { font-size: 18px; font-weight: 700; color: #a78bfa; margin-bottom: 8px; }
  .meta-label { font-size: 12px; color: #888; margin-top: 10px; margin-bottom: 4px; }
  .meta-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: #1e1040; border: 1px solid #3730a3; color: #a78bfa; padding: 3px 10px; border-radius: 20px; font-size: 12px; }

  .progress-wrap { margin-top: 12px; }
  .progress-label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
  .progress-bar { height: 8px; background: #1e1e3a; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #2563eb); border-radius: 4px; transition: width 0.4s; }

  .download-area { text-align: center; padding: 20px; }
  .download-area video { width: 100%; max-height: 300px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #2a2a4a; }

  .hidden { display: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-free { background: #0a2e1e; color: #34d399; border: 1px solid #059669; }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Shorts Factory</h1>
  <p>AI가 주제 선정부터 영상 완성까지 자동으로</p>
</div>

<div class="container">

  <!-- API 설정 -->
  <div class="card">
    <h2>⚙️ API 설정</h2>
    <div class="row">
      <div>
        <label>Gemini API 키 <span class="badge badge-free">무료</span></label>
        <input type="password" id="gemini-key" placeholder="AIza...">
      </div>
      <div>
        <label>Pexels API 키 <span class="badge badge-free">무료</span></label>
        <input type="password" id="pexels-key" placeholder="Pexels 키 입력">
      </div>
    </div>
    <div style="margin-top:14px">
      <label>콘텐츠 주제 (니치)</label>
      <select id="niche">
        <option value="역사/교양 (충격적인 사실)">📜 역사/교양 (충격적인 사실)</option>
        <option value="AI/테크 지식 큐레이션">🤖 AI/테크 지식 큐레이션</option>
        <option value="건강/생활 꿀팁">💪 건강/생활 꿀팁</option>
        <option value="심리학/자기계발">🧠 심리학/자기계발</option>
      </select>
    </div>
    <div style="margin-top:12px">
      <label>추가 지시 (선택사항)</label>
      <textarea id="extra-prompt" placeholder="예: 조선시대 관련 주제로, 20~30대 타겟, 반드시 반전이 있는 내용으로"></textarea>
    </div>
  </div>

  <!-- 진행 단계 -->
  <div class="steps" id="steps">
    <div class="step" id="step-1"><span class="step-dot"></span>주제 생성</div>
    <div class="step" id="step-2"><span class="step-dot"></span>영상 다운로드</div>
    <div class="step" id="step-3"><span class="step-dot"></span>영상 편집</div>
    <div class="step" id="step-4"><span class="step-dot"></span>완성</div>
  </div>

  <!-- 실행 버튼 -->
  <button class="btn btn-primary" id="start-btn" onclick="startFactory()">
    ▶ 영상 자동 생성 시작
  </button>

  <!-- 로그 -->
  <div class="card" id="log-card" style="margin-top:20px; display:none">
    <h2>📋 진행 로그</h2>
    <div class="log" id="log"></div>
  </div>

  <!-- 스크립트 결과 -->
  <div class="card hidden" id="script-card">
    <h2>📝 생성된 스크립트</h2>
    <div class="meta-box" id="meta-box"></div>
    <div style="margin-top:16px; font-size:13px; color:#aaa; margin-bottom:8px;">장면 구성</div>
    <div class="script-box" id="script-scenes"></div>
    <button class="btn btn-primary" id="proceed-btn" onclick="proceedWithVideo()" style="margin-top:16px">
      ✅ 이 주제로 영상 만들기
    </button>
    <button class="btn" onclick="startFactory()" style="background:#1e1e3a; color:#aaa; margin-top:8px;">
      🔄 다른 주제 다시 생성
    </button>
  </div>

  <!-- 영상 제작 진행 -->
  <div class="card hidden" id="video-card">
    <h2>🎬 영상 제작 중...</h2>
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">준비 중...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="log" id="video-log" style="margin-top:12px"></div>
  </div>

  <!-- 완성 -->
  <div class="card hidden" id="done-card">
    <h2>🎉 완성!</h2>
    <div class="download-area">
      <video id="preview-video" controls></video>
      <a class="btn btn-success" id="download-btn" download="shorts.mp4">⬇️ 영상 다운로드 (mp4)</a>
      <div style="margin-top:16px">
        <button class="btn" onclick="copyMeta()" style="background:#1e1040; color:#a78bfa; border:1px solid #3730a3;">
          📋 제목 + 해시태그 복사
        </button>
      </div>
    </div>
    <div class="meta-box" id="done-meta" style="margin-top:12px"></div>
    <button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px;">
      🔄 새 영상 만들기
    </button>
  </div>

</div>

<!-- FFmpeg -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: false });

let scriptData = null;
let videoBlobs = [];

// ── 로그 유틸 ──────────────────────────────────────────
function log(msg, type='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function vlog(msg) {
  const el = document.getElementById('video-log');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStep(n, state) {
  const el = document.getElementById('step-' + n);
  el.className = 'step ' + state;
}

function setProgress(pct, label) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

// ── 1단계: Gemini로 스크립트 생성 ──────────────────────
async function startFactory() {
  const geminiKey = document.getElementById('gemini-key').value.trim();
  const niche = document.getElementById('niche').value;
  const extra = document.getElementById('extra-prompt').value.trim();

  if (!geminiKey) { alert('Gemini API 키를 입력해주세요.'); return; }

  document.getElementById('start-btn').disabled = true;
  document.getElementById('log-card').style.display = 'block';
  document.getElementById('script-card').classList.add('hidden');
  document.getElementById('done-card').classList.add('hidden');
  document.getElementById('log').innerHTML = '';

  setStep(1, 'active');
  log('🤖 Gemini에게 스크립트 요청 중...', 'info');

  const prompt = `너는 유튜브 숏츠 / 인스타 릴스 전문 콘텐츠 제작자야.
'${niche}' 분야에서 오늘 날짜 기준 바이럴 가능성이 높은 흥미로운 주제 하나를 직접 골라서,
아래 JSON 형식으로만 응답해줘. JSON 외에 다른 텍스트나 마크다운 기호는 절대 포함하지 마.
${extra ? '추가 조건: ' + extra : ''}

{
  "title": "유튜브 제목 (클릭 유도형, 30자 이내)",
  "instagram_title": "인스타그램 제목",
  "topic": "선택한 주제 한 줄 요약",
  "thumbnail_text": "썸네일 강렬한 문구 20자 이내",
  "scenes": [
    {"time":"00:00-00:05","subtitle":"시청자를 멈추게 하는 충격적 훅 (15자 이내)","stock_keyword":"pexels 검색 영어 키워드"},
    {"time":"00:05-00:15","subtitle":"핵심 사실 1 (15자 이내)","stock_keyword":"영어 키워드"},
    {"time":"00:15-00:25","subtitle":"핵심 사실 2 (15자 이내)","stock_keyword":"영어 키워드"},
    {"time":"00:25-00:35","subtitle":"핵심 사실 3 (15자 이내)","stock_keyword":"영어 키워드"},
    {"time":"00:35-00:50","subtitle":"반전 또는 결론 (15자 이내)","stock_keyword":"영어 키워드"},
    {"time":"00:50-01:00","subtitle":"구독과 좋아요 부탁드려요!","stock_keyword":"영어 키워드"}
  ],
  "youtube_hashtags": ["#태그1","#태그2","#태그3","#태그4","#태그5"],
  "instagram_hashtags": ["#태그1","#태그2","#태그3","#태그4","#태그5","#태그6","#태그7","#태그8","#태그9","#태그10"]
}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Gemini API 오류');
    }

    const data = await res.json();
    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    raw = raw.replace(/```json|```/g, '').trim();

    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON 파싱 실패');

    scriptData = JSON.parse(match[0]);
    setStep(1, 'done');
    log('✅ 주제 선정 완료: ' + scriptData.topic, 'ok');
    log('✅ 제목: ' + scriptData.title, 'ok');

    renderScript();
    document.getElementById('script-card').classList.remove('hidden');
    document.getElementById('start-btn').disabled = false;

  } catch(e) {
    log('❌ 오류: ' + e.message, 'err');
    setStep(1, '');
    document.getElementById('start-btn').disabled = false;
  }
}

// ── 스크립트 화면 렌더링 ──────────────────────────────
function renderScript() {
  const m = scriptData;
  document.getElementById('meta-box').innerHTML = `
    <div class="meta-title">${m.title}</div>
    <div style="color:#888;font-size:13px;margin-bottom:6px">${m.topic}</div>
    <div class="meta-label">썸네일 문구</div>
    <div style="color:#fbbf24;font-size:15px;font-weight:600">${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  `;
  document.getElementById('script-scenes').innerHTML = m.scenes.map(s => `
    <div class="scene-row">
      <div class="scene-time">${s.time}</div>
      <div class="scene-text">
        <div class="scene-sub">${s.subtitle}</div>
        <div class="scene-kw">🔍 ${s.stock_keyword}</div>
      </div>
    </div>
  `).join('');
}

// ── 2단계: Pexels 영상 다운로드 ──────────────────────
async function proceedWithVideo() {
  const pexelsKey = document.getElementById('pexels-key').value.trim();
  if (!pexelsKey) { alert('Pexels API 키를 입력해주세요.'); return; }

  document.getElementById('script-card').classList.add('hidden');
  document.getElementById('video-card').classList.remove('hidden');
  setStep(2, 'active');
  setProgress(5, 'Pexels에서 영상 검색 중...');

  videoBlobs = [];
  const scenes = scriptData.scenes;

  for (let i = 0; i < scenes.length; i++) {
    const kw = scenes[i].stock_keyword;
    vlog(`[${i+1}/${scenes.length}] 검색: "${kw}"`);

    try {
      // Pexels CORS 우회: 프록시 사용
      const res = await fetch(
        `https://api.pexels.com/videos/search?query=${encodeURIComponent(kw)}&per_page=5&orientation=portrait`,
        { headers: { Authorization: pexelsKey } }
      );
      const data = await res.json();
      const videos = data.videos || [];

      if (videos.length === 0) {
        vlog(`  ⚠️ 결과 없음, 기본 영상 사용`);
        videoBlobs.push(null);
        continue;
      }

      // 세로 영상 우선 선택
      const vfiles = videos[0].video_files || [];
      let chosen = vfiles.find(f => f.height > f.width) || vfiles[0];

      vlog(`  ⬇️ 다운로드 중...`);
      const vidRes = await fetch(chosen.link);
      const blob = await vidRes.blob();
      videoBlobs.push(blob);
      vlog(`  ✅ 완료 (${(blob.size/1024/1024).toFixed(1)}MB)`);

    } catch(e) {
      vlog(`  ❌ 실패: ${e.message}`);
      videoBlobs.push(null);
    }

    setProgress(5 + (i+1) / scenes.length * 35, `영상 다운로드 중... (${i+1}/${scenes.length})`);
  }

  setStep(2, 'done');
  await editVideo();
}

// ── 3단계: FFmpeg 영상 편집 ───────────────────────────
async function editVideo() {
  setStep(3, 'active');
  setProgress(42, 'FFmpeg 로딩 중...');
  vlog('🔧 영상 편집 엔진 로딩 중...');

  if (!ffmpeg.isLoaded()) {
    await ffmpeg.load();
  }
  vlog('✅ FFmpeg 로드 완료');

  const scenes = scriptData.scenes;
  const clipNames = [];

  for (let i = 0; i < scenes.length; i++) {
    const scene = scenes[i];
    const blob = videoBlobs[i];
    const [startStr, endStr] = scene.time.split('-');
    const start = timeToSec(startStr);
    const end = timeToSec(endStr);
    const duration = end - start;
    const clipName = `clip_${i}.mp4`;
    const outName = `out_${i}.mp4`;

    setProgress(42 + (i / scenes.length) * 40, `장면 ${i+1}/${scenes.length} 처리 중...`);
    vlog(`[${i+1}/${scenes.length}] 장면 편집: ${scene.time}`);

    if (blob) {
      const arrBuf = await blob.arrayBuffer();
      ffmpeg.FS('writeFile', clipName, new Uint8Array(arrBuf));

      // 세로 포맷으로 변환 + 길이 자르기 + 자막 텍스트 굽기
      const subtitle = scene.subtitle.replace(/'/g, "\\'");
      await ffmpeg.run(
        '-i', clipName,
        '-t', String(duration),
        '-vf', `scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,drawtext=text='${subtitle}':fontcolor=white:fontsize=80:x=(w-text_w)/2:y=h*0.62:box=1:boxcolor=black@0.55:boxborderw=14`,
        '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '26',
        '-r', '30',
        '-an',
        outName
      );
    } else {
      // 영상 없으면 검정 화면 생성
      const subtitle = scene.subtitle.replace(/'/g, "\\'");
      await ffmpeg.run(
        '-f', 'lavfi', '-i', `color=c=black:s=1080x1920:d=${duration}`,
        '-vf', `drawtext=text='${subtitle}':fontcolor=white:fontsize=80:x=(w-text_w)/2:y=h*0.62:box=1:boxcolor=black@0.55:boxborderw=14`,
        '-c:v', 'libx264', '-preset', 'ultrafast',
        outName
      );
    }

    clipNames.push(outName);
    vlog(`  ✅ 장면 ${i+1} 완료`);
  }

  // 모든 클립 합치기
  setProgress(85, '클립 합치는 중...');
  vlog('🔗 전체 영상 합치는 중...');

  const listContent = clipNames.map(n => `file '${n}'`).join('\n');
  ffmpeg.FS('writeFile', 'filelist.txt', listContent);

  await ffmpeg.run(
    '-f', 'concat', '-safe', '0',
    '-i', 'filelist.txt',
    '-c', 'copy',
    'final.mp4'
  );

  setProgress(95, '완성 영상 준비 중...');
  vlog('✅ 영상 합치기 완료!');

  const finalData = ffmpeg.FS('readFile', 'final.mp4');
  const finalBlob = new Blob([finalData.buffer], { type: 'video/mp4' });
  const url = URL.createObjectURL(finalBlob);

  document.getElementById('preview-video').src = url;
  document.getElementById('download-btn').href = url;

  setStep(3, 'done');
  setStep(4, 'done');
  setProgress(100, '완성!');

  renderDoneMeta();
  document.getElementById('video-card').classList.add('hidden');
  document.getElementById('done-card').classList.remove('hidden');
  vlog('🎉 완성!');
}

// ── 완성 메타데이터 렌더링 ────────────────────────────
function renderDoneMeta() {
  const m = scriptData;
  document.getElementById('done-meta').innerHTML = `
    <div class="meta-title">${m.title}</div>
    <div class="meta-label">인스타그램 제목</div>
    <div style="color:#e8e6f0;font-size:14px">${m.instagram_title}</div>
    <div class="meta-label">썸네일 문구</div>
    <div style="color:#fbbf24;font-size:15px;font-weight:600">${m.thumbnail_text}</div>
    <div class="meta-label">유튜브 해시태그</div>
    <div class="meta-tags">${m.youtube_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="meta-label">인스타그램 해시태그</div>
    <div class="meta-tags">${m.instagram_hashtags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  `;
}

// ── 메타데이터 복사 ──────────────────────────────────
function copyMeta() {
  const m = scriptData;
  const text = `${m.title}\n\n${m.youtube_hashtags.join(' ')}\n\n---인스타---\n${m.instagram_title}\n\n${m.instagram_hashtags.join(' ')}`;
  navigator.clipboard.writeText(text).then(() => alert('📋 복사 완료!'));
}

// ── 유틸 ─────────────────────────────────────────────
function timeToSec(t) {
  const [m, s] = t.trim().split(':').map(Number);
  return m * 60 + s;
}
